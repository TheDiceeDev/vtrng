name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Ensure the default token has read access to fetch Python binaries
permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Global environment variables for the whole job
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_AUTO_UPDATE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Cache cibuildwheel's downloaded Python installations
      - name: Cache cibuildwheel
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\cibuildwheel\Cache
            ~/Library/Caches/cibuildwheel
            ~/.cache/cibuildwheel
          key: cibw-${{ matrix.os }}-v2.21.3
          
      # Cache NuGet packages (Windows Python downloads)
      - name: Cache NuGet (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            ~\.nuget\packages
          key: nuget-${{ matrix.os }}-v2.21.3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: pp* *-win32 *-manylinux_i686 *-musllinux_i686 *-musllinux_x86_64
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ENVIRONMENT: PYTHONIOENCODING=utf-8
          CIBW_ENVIRONMENT_WINDOWS: PYTHONIOENCODING=utf-8
          CIBW_TEST_COMMAND: >
            python -c "from vtrng import VTRNG; rng = VTRNG(verbose=False, startup_assessment=False); print(rng.random_hex(16))"
          CIBW_ENVIRONMENT_PASS_LINUX: GITHUB_TOKEN
          CIBW_ENVIRONMENT_PASS_WINDOWS: GITHUB_TOKEN
          CIBW_ENVIRONMENT_PASS_MACOS: GITHUB_TOKEN
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # -- Source distribution --
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # -- Inspect what we built --
  inspect:
    name: List built packages
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Show all packages
        run: |
          echo " === VTRNG Built Packages === "
          echo ""
          for f in dist/*; do
            size=$(du -h "$f" | cut -f1)
            echo "  $size  $(basename $f)"
          done
          echo ""
          echo "Total: $(ls dist/* | wc -l) files"
          echo "============================================"

  # Publish to TestPyPI
  publish_test:
    name: Upload to TestPyPI
    needs: [inspect]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/


