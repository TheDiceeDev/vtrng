name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  # Allow manual trigger for testing without publishing
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Python versions we support (3.9 through 3.13)
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
          # Skip PyPy and 32-bit (we use rdtsc which is 64-bit)
          CIBW_SKIP: pp* *-win32 *-manylinux_i686 *-musllinux_i686
          # Linux: manylinux wheels (work on all distros)
          CIBW_ARCHS_LINUX: x86_64
          # macOS: both Intel and Apple Silicon
          CIBW_ARCHS_MACOS: x86_64 arm64
          # Windows: 64-bit only
          CIBW_ARCHS_WINDOWS: AMD64
          # Test each wheel after building
          CIBW_TEST_COMMAND: >
            python -c "from vtrng import VTRNG; rng = VTRNG(verbose=False, startup_assessment=False); print(rng.random_hex(16))"
          # Set encoding for Windows
          CIBW_ENVIRONMENT_WINDOWS: PYTHONIOENCODING=utf-8

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Show what we built (always runs)
  inspect:
    name: Inspect built packages
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: List all packages
        run: |
          echo "=== Built Packages ==="
          ls -lh dist/
          echo ""
          echo "=== Wheel Count ==="
          ls dist/*.whl 2>/dev/null | wc -l
          echo ""
          echo "=== Platforms ==="
          for f in dist/*.whl; do
            echo "  $(basename $f)"
          done

  # real PyPI implementation
  # publish:
  #   name: Upload to PyPI
  #   needs: [build_wheels, build_sdist, inspect]
  #   runs-on: ubuntu-latest
  #   # Only publish on tag push, not manual trigger
  #   if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with:
  #         pattern: '*'
  #         path: dist
  #         merge-multiple: true
  #
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1

  # Publish to TestPyPI
  publish_test:
    name: Upload to TestPyPI
    needs: [build_wheels, build_sdist, inspect]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/